version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - '@types/*'
          - 'vitest'
          - 'vite'
          - 'typescript'
      production-dependencies:
        patterns:
          - 'react*'
          - 'zustand'
          - 'socket.io*'
          - 'fastify*'
          - 'hls.js'
          - 'jsonwebtoken'
          - 'bcryptjs'
          - '@prisma/*'
          - 'prisma'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
