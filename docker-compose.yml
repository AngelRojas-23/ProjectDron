version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: streaming-dron-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: streaming_dron
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: streaming-dron-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@streaming-dron.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  mavlink2rest:
    image: mavlink/mavlink2rest
    container_name: streaming-dron-mavlink
    ports:
      - "8088:8088"
      - "14550:14550/udp"
    environment:
      MAVLINK_SRC: "udpin:0.0.0.0:14550"
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:1
    container_name: streaming-dron-mediamtx
    ports:
      - "1935:1935"
      - "8888:8888"
    environment:
      MTX_PROTOCOLS: tcp
      MTX_RTMP_ADDRESS: ":1935"
      MTX_HLS_ADDRESS: ":8888"
      MTX_HLS_VARIANT: lowLatency
      MTX_HLS_SEGMENT_DURATION: 1s
      MTX_HLS_PART_DURATION: 200ms
    restart: unless-stopped

  ffmpeg-simulator:
    image: jrottenberg/ffmpeg
    container_name: streaming-dron-ffmpeg-sim
    command: >
      -re -f lavfi -i testsrc2=size=1280x720:rate=30
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f flv rtmp://mediamtx:1935/drone/drone-1
    depends_on:
      mediamtx:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data: